<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Corps du document (contour mauve Docbel) -->
  <rect x="6.5" y="3.5" width="19" height="25" rx="3" fill="#ffffff" stroke="#5B46E5" stroke-width="2"/>
  <!-- Coin plié -->
  <path d="M20.6 3.7 L25.3 8.4 L20.6 8.4 Z" fill="#5B46E5" opacity="0.22"/>
  <!-- En-tête mauve -->
  <rect x="9.5" y="7.6" width="13" height="2.6" rx="1.3" fill="#5B46E5">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <!-- Lignes tricolore belge (noir / jaune / rouge) avec shimmer séquentiel -->
  <rect x="9.5" y="13.2" width="13" height="2.6" rx="1.3" fill="#21201F">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="9.5" y="17.9" width="13" height="2.6" rx="1.3" fill="#FCD116">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="9.5" y="22.6" width="13" height="2.6" rx="1.3" fill="#EF3340">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
