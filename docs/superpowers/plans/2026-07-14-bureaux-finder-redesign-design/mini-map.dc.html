<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;overflow:hidden;background:{{ bg }}">
  <div style="position:absolute;inset:-15%;background-image:linear-gradient({{ grid }} 1px,transparent 1px),linear-gradient(90deg,{{ grid }} 1px,transparent 1px);background-size:40px 40px"></div>
  <div style="position:absolute;left:-12%;top:-8%;width:58%;height:46%;background:{{ water }};filter:blur(2px);border-radius:0 0 55% 45%"></div>
  <div style="position:absolute;right:-6%;bottom:6%;width:48%;height:42%;background:{{ park }};border-radius:52% 40% 46% 54%;filter:blur(1px)"></div>
  <div style="position:absolute;left:8%;bottom:-6%;width:40%;height:36%;background:{{ park }};border-radius:46% 54% 50% 40%;filter:blur(1px);opacity:.7"></div>

  <span style="position:absolute;left:44%;top:50%;font-size:12px;font-weight:800;letter-spacing:.04em;color:{{ label }};transform:translate(-50%,-50%)">BRUXELLES</span>
  <span style="position:absolute;left:62%;top:24%;font-size:10px;font-weight:600;color:{{ label }}">Schaerbeek</span>
  <span style="position:absolute;left:24%;top:22%;font-size:10px;font-weight:600;color:{{ label }}">Jette</span>
  <span style="position:absolute;left:22%;top:70%;font-size:10px;font-weight:600;color:{{ label }}">Anderlecht</span>
  <span style="position:absolute;left:66%;top:74%;font-size:10px;font-weight:600;color:{{ label }}">Ixelles</span>

  <sc-for list="{{ pins }}" as="p" hint-placeholder-count="5">
    <button onClick="{{ p.select }}" title="{{ p.name }}" style="position:absolute;left:{{ p.left }};top:{{ p.top }};transform:translate(-50%,-100%);border:none;background:none;cursor:pointer;padding:0;z-index:2">
      <span style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:13px 13px 13px 4px;background:{{ p.color }};box-shadow:0 5px 14px rgba(20,16,40,.32);border:2.5px solid #fff">{{ p.icon }}</span>
    </button>
  </sc-for>

  <div style="position:absolute;right:14px;bottom:14px;z-index:3;display:flex;flex-direction:column;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 12px rgba(20,16,40,.18)">
    <span style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#4a4560;border-bottom:1px solid #eee"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></span>
    <span style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#4a4560"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"></path></svg></span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:500},&quot;pins&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;array&quot;},&quot;bg&quot;:{&quot;editor&quot;:null},&quot;grid&quot;:{&quot;editor&quot;:null},&quot;label&quot;:{&quot;editor&quot;:null},&quot;park&quot;:{&quot;editor&quot;:null},&quot;water&quot;:{&quot;editor&quot;:null}}"></script>
</body>
</html>
