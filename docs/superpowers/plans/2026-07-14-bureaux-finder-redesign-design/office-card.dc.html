<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ open }}" style="position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid #ecebf3;border-radius:20px;padding:14px;cursor:pointer;box-shadow:0 1px 2px rgba(20,16,40,.04)">
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="flex:none;width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:{{ typeColor }}">{{ icon }}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:{{ typeColor }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ typeLabel }}</span>
        <span style="flex:none;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;color:{{ statusColor }};background:{{ statusBg }}">{{ statusLabel }}</span>
      </div>
      <div style="font-size:15px;font-weight:700;color:#211d2e;line-height:1.25;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ name }}</div>
      <div style="font-size:12px;color:#6f6a80;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ address }}</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8b8798;margin-top:6px">
        <span style="font-weight:700;color:#5b566b">{{ dist }}</span>
        <span>·</span><span>{{ walk }} à pied</span>
      </div>
    </div>
    <button onClick="{{ fav }}" style="flex:none;border:none;background:none;padding:2px;cursor:pointer;line-height:0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="{{ starFill }}" stroke="{{ starStroke }}" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3.5l2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 17.9 6.7 19.6l1-5.8L3.5 9.7l5.9-.9z"></path></svg>
    </button>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="{{ mapsHref }}" target="_blank" onClick="{{ stop }}" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;height:38px;border-radius:11px;border:1px solid #e4e2ee;color:#4a4560;font-size:13px;font-weight:600;text-decoration:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-8-8 18-2-8z"></path></svg>Itinéraire</a>
    <a href="{{ actionHref }}" target="_blank" onClick="{{ stop }}" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;height:38px;border-radius:11px;border:none;background:color-mix(in srgb, var(--accent,#6d5ce7) 12%, #fff);color:var(--accent,#6d5ce7);font-size:13px;font-weight:700;text-decoration:none">{{ actionIcon }}{{ actionLabel }}</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:344,&quot;height&quot;:152},&quot;item&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const it = this.props.item || {};
    return {
      ...it,
      open: () => { it.select && it.select(); },
      fav: (e) => { e.stopPropagation(); it.toggleFav && it.toggleFav(); },
      stop: (e) => { e.stopPropagation(); },
    };
  }
}
</script>
</body>
</html>
